<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNGYS Media Artist</title>
    <meta name="description"
        content="Joung Yunsu Media artist based in Seoul. Exhibition, project, and performance archive.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cv.css">
</head>

<body>



    <!-- Navigation -->
    <nav id="nav">
        <a href="index.html" class="nav-logo">JNGYS</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link" data-en="Work" data-ko="작업">Work</a>
            <a href="about.html" class="nav-link" data-en="About" data-ko="소개">About</a>
            <a href="about.html#contact" class="nav-link" data-en="Contact" data-ko="연락처">Contact</a>
            <a href=" https://instagram.com/" target="_blank" class="nav-link">Instagram</a>
            <button id="lang-toggle" class="lang-toggle" aria-label="Toggle language">KR</button>
        </div>
        <button id="hamburger" class="hamburger" aria-label="Open menu">
            <span></span><span></span>
        </button>
    </nav>

    <!-- Mobile Nav Dropdown -->
    <div id="mobile-nav" class="mobile-nav">
        <a href="index.html" class="mobile-nav-link" data-en="Work" data-ko="작업">Work</a>
        <a href="about.html" class="mobile-nav-link" data-en="About" data-ko="소개">About</a>
        <a href="about.html#contact" class="mobile-nav-link" data-en="Contact" data-ko="연락처">Contact</a>
        <a href="https://instagram.com/" target="_blank" class="mobile-nav-link">Instagram</a>
        <button id="lang-toggle-mobile" class="lang-toggle" aria-label="Toggle language">KR</button>
    </div>

    <!-- Mobile Tab Bar -->
    <div class="mobile-tab-bar" id="mobile-tab-bar">
        <button class="mobile-tab active" data-target="work" data-en="WORK" data-ko="작업">WORK</button>
        <button class="mobile-tab" data-target="project" data-en="PROJECT" data-ko="프로젝트">PROJECT</button>
    </div>

    <!-- Works Section -->
    <section id="works" class="split-section">
        <!-- Work Pane -->
        <div class="split-pane pane-left" id="pane-work">
            <div class="pane-header">
                <h2 data-en="WORK" data-ko="작업">WORK</h2>
            </div>
            <div class="pane-scroll" id="scroll-work">
                <div class="works-grid-inner" id="grid-work">
                    <!-- JS renders Work items here -->
                </div>
                <!-- Footer -->
                <footer class="pane-footer">
                    <span>&copy; 2026 Joung Yunsu</span>
                </footer>
            </div>
        </div>
        <div class="split-pane pane-right" id="pane-project">
            <div class="pane-header">
                <h2 data-en="PROJECT" data-ko="프로젝트">PROJECT</h2>
            </div>
            <div class="pane-scroll" id="scroll-project">
                <div class="works-grid-inner" id="grid-project">
                    <!-- JS renders Project items here -->
                </div>
                <!-- Footer -->
                <footer class="pane-footer">
                    <span>&copy; 2026 Joung Yunsu</span>
                </footer>
            </div>
        </div>
    </section>


    <!-- Work Modal -->
    <div id="work-modal" class="work-modal">
        <div class="work-modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>

    <!-- Lightbox Overlay -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <img id="lightbox-img" class="lightbox-img" src="" alt="Enlarged view">
    </div>

    <script src="works-data.js"></script>
    <script src="script.js"></script>
</body>

</html>
